let state = { teams: {}, groups: [], games: [], loading: false };
let autoTimer = null;

const $ = id => document.getElementById(id);

function teamZh(name) { return TEAM_ZH[name] || name; }

function parseScorers(raw) {
    if (!raw || raw === 'null') return [];
    try {
        const fixed = raw.replace(/'/g, '"').replace(/\\"/g, "'");
        const arr = JSON.parse(fixed.startsWith('[') ? fixed : `[${fixed}]`);
        return Array.isArray(arr) ? arr : [raw];
    } catch {
        return raw.split(',').map(s => s.trim()).filter(Boolean);
    }
}

function gameToTaipeiDate(localDate) {
    const [datePart, timePart] = localDate.split(' ');
    const [mm, dd, yyyy] = datePart.split('/');
    const [hh, min] = timePart.split(':');
    const utcMs = Date.UTC(+yyyy, +mm - 1, +dd, +hh + 4, +min);
    return new Date(utcMs + 8 * 3600000);
}

function getTaipeiToday() {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(now);
    return parts;
}

function isTodayInTaipei(game) {
    const taipei = gameToTaipeiDate(game.local_date);
    const tp = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(taipei);
    return tp === getTaipeiToday();
}

function isLive(game) {
    return game.finished !== 'TRUE' && game.time_elapsed && game.time_elapsed !== 'finished' && game.time_elapsed !== 'notstarted';
}

function isFinished(game) {
    return game.finished === 'TRUE' || game.time_elapsed === 'finished';
}

/** 只顯示已完賽或進行中，排除尚未開踢的賽事 */
function isPlayedOrLive(game) {
    return isFinished(game) || isLive(game);
}

function matchStatus(game) {
    if (isLive(game)) return { label: '進行中', cls: 'text-amber-400', badge: 'bg-amber-950 text-amber-400' };
    if (game.finished === 'TRUE') return { label: '已結束', cls: 'text-zinc-400', badge: 'bg-zinc-800 text-zinc-400' };
    return { label: '即將開賽', cls: 'text-blue-400', badge: 'bg-blue-950 text-blue-400' };
}

function winnerLabel(home, away, hs, as) {
    const hi = +hs, ai = +as;
    if (isNaN(hi) || isNaN(ai)) return '';
    if (hi > ai) return `${teamZh(home)}勝`;
    if (ai > hi) return `${teamZh(away)}勝`;
    return '和局';
}

function highlightScorerNote(game) {
    const homeS = parseScorers(game.home_scorers);
    const awayS = parseScorers(game.away_scorers);
    const all = [...homeS, ...awayS];
    if (!all.length) return '';
    const first = all[0].replace(/"/g, '');
    const hatTrick = all.filter(s => s.includes("'")).length >= 3;
    if (hatTrick) return '精彩進球大戰';
    if (first.includes('(OG)')) return '烏龍球影響戰局';
    if (first.includes("'")) return first;
    return first.slice(0, 30);
}

function renderMatches() {
    const grid = $('matches-grid');
    const todayAll = state.games.filter(isTodayInTaipei);
    const todayGames = todayAll.filter(isPlayedOrLive).sort((a, b) => gameToTaipeiDate(a.local_date) - gameToTaipeiDate(b.local_date));
    const upcoming = todayAll.filter(g => !isPlayedOrLive(g)).length;
    $('match-count').textContent = todayGames.length ? `（${todayGames.length} 場）` : '';

    if (!todayGames.length) {
        grid.innerHTML = '';
        $('no-matches').classList.remove('hidden');
        $('no-matches').textContent = upcoming
            ? `今日尚有 ${upcoming} 場比賽尚未開踢，完賽後將自動顯示於此。`
            : '今日尚無已完賽或進行中的比賽。';
        return;
    }
    $('no-matches').classList.add('hidden');

    grid.innerHTML = todayGames.map(g => {
        const home = g.home_team_name_en || 'TBD';
        const away = g.away_team_name_en || 'TBD';
        const hs = g.home_score ?? '-';
        const as = g.away_score ?? '-';
        const st = matchStatus(g);
        const note = highlightScorerNote(g);
        const win = winnerLabel(home, away, hs, as);
        const live = isLive(g);
        const homeTeam = state.teams[g.home_team_id];
        const awayTeam = state.teams[g.away_team_id];

        return `
        <div class="match-card fade-in bg-zinc-900 border ${live ? 'border-amber-500/50' : 'border-zinc-700'} rounded-3xl p-5">
            <div class="flex justify-between items-start gap-3">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs px-2.5 py-0.5 rounded-xl ${st.badge}">${st.label}</span>
                        ${live ? '<span class="live-dot w-2 h-2 rounded-full bg-amber-400"></span>' : ''}
                        <span class="text-xs text-zinc-500">${g.group}組</span>
                    </div>
                    <div class="flex items-center gap-3 font-semibold text-lg">
                        ${homeTeam?.flag ? `<img src="${homeTeam.flag}" class="w-6 h-4 object-cover rounded-sm" alt="">` : ''}
                        <span>${teamZh(home)}</span>
                        <span class="text-emerald-400 tabular-nums">${hs}</span>
                        <span class="text-zinc-500">-</span>
                        <span class="text-red-400 tabular-nums">${as}</span>
                        <span>${teamZh(away)}</span>
                        ${awayTeam?.flag ? `<img src="${awayTeam.flag}" class="w-6 h-4 object-cover rounded-sm" alt="">` : ''}
                    </div>
                    ${note ? `<div class="text-xs text-zinc-400 mt-2 truncate">${note}</div>` : ''}
                </div>
                <div class="text-right text-sm shrink-0">
                    ${win ? `<div class="text-emerald-400 font-medium">${win}</div>` : ''}
                    ${live && g.time_elapsed ? `<div class="text-amber-400 text-xs mt-1">${g.time_elapsed}</div>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderStandings() {
    const container = $('standings-container');
    const focus = state.groups.filter(g => FOCUS_GROUPS.includes(g.name));

    container.innerHTML = focus.map(g => {
        const rows = [...g.teams]
            .sort((a, b) => +b.pts - +a.pts || +b.gd - +a.gd || +b.gf - +a.gf)
            .map((t, i) => {
                const team = state.teams[t.team_id];
                const name = team ? teamZh(team.name_en) : `隊伍 ${t.team_id}`;
                const eliminated = +t.mp >= 2 && +t.pts === 0;
                const leader = i === 0;
                return `
                <tr class="border-b border-zinc-800 ${eliminated ? 'text-red-400' : ''}">
                    <td class="py-2.5 font-medium">
                        <span class="inline-flex items-center gap-2">
                            ${team?.flag ? `<img src="${team.flag}" class="w-5 h-3.5 object-cover rounded-sm" alt="">` : ''}
                            ${name}${eliminated ? '（岌岌可危）' : ''}
                        </span>
                    </td>
                    <td class="text-center">${t.mp}</td>
                    <td class="text-center">${t.w}</td>
                    <td class="text-center">${t.d}</td>
                    <td class="text-center">${t.l}</td>
                    <td class="text-center ${leader ? 'font-bold text-emerald-400' : ''}">${t.pts}</td>
                </tr>`;
            }).join('');

        const hasToday = state.games.some(m => m.group === g.name && isTodayInTaipei(m));

        return `
        <div class="fade-in">
            <div class="flex items-center gap-2 mb-3">
                <span class="font-bold text-lg">${g.name}組</span>
                ${hasToday ? '<span class="text-xs px-3 py-1 bg-emerald-950 text-emerald-400 rounded-2xl">今日賽事</span>' : ''}
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-zinc-400 border-b border-zinc-700">
                            <th class="text-left py-2">隊伍</th>
                            <th class="text-center">賽</th>
                            <th class="text-center">勝</th>
                            <th class="text-center">和</th>
                            <th class="text-center">負</th>
                            <th class="text-center">積分</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>`;
    }).join('');
}

function matchKey(home, away) {
    return [home, away].sort().join('|');
}

function getTodayFinishedKeys() {
    return new Set(
        state.games
            .filter(g => isTodayInTaipei(g) && isFinished(g))
            .map(g => matchKey(g.home_team_name_en, g.away_team_name_en))
    );
}

function getTeamsPlayingToday() {
    const set = new Set();
    state.games.filter(isTodayInTaipei).forEach(g => {
        if (g.home_team_name_en) set.add(g.home_team_name_en);
        if (g.away_team_name_en) set.add(g.away_team_name_en);
    });
    return set;
}

function getIdleTeams() {
    const playing = getTeamsPlayingToday();
    return Object.values(state.teams)
        .filter(t => t.name_en && !playing.has(t.name_en))
        .sort((a, b) => (a.groups || '').localeCompare(b.groups || '') || a.name_en.localeCompare(b.name_en));
}

function generateNews() {
    const todayKeys = getTodayFinishedKeys();
    const hasApi = state.games.length > 0;

    const items = TODAY_TOP10_NEWS
        .filter(item => {
            if (!hasApi) return true;
            const key = matchKey(item.match.home, item.match.away);
            return todayKeys.has(key);
        })
        .sort((a, b) => a.priority - b.priority)
        .slice(0, 10);

    if (items.length) return items;

    return [{
        id: 'fallback',
        tags: [{ text: '等待賽果', cls: 'text-zinc-400 bg-zinc-800' }],
        border: 'border-zinc-700',
        meta: '',
        title: '今日比賽結束後將顯示 X 熱議 Top 10',
        summary: '新聞將在今日比賽完賽後自動載入。',
        points: [],
        source: '',
    }];
}

function generateIdleNews() {
    const playing = getTeamsPlayingToday();
    const hasApi = state.games.length > 0;

    return IDLE_TEAM_NEWS
        .filter(item => {
            if (!hasApi) return true;
            return item.relatedTeams.every(t => !playing.has(t));
        })
        .sort((a, b) => a.priority - b.priority);
}

function renderNewsCard(n, i) {
    return `
        <article class="news-card fade-in bg-zinc-900 border ${n.border} rounded-3xl p-6 md:p-7">
            <div class="flex flex-wrap items-center gap-2 mb-3">
                <span class="text-xs font-bold text-zinc-500 tabular-nums">#${i + 1}</span>
                ${(n.tags || []).map(t => `
                    <span class="text-xs font-bold px-3 py-1 rounded-2xl ${t.cls}">${t.text}</span>
                `).join('')}
                ${n.meta ? `<span class="text-xs text-zinc-500 ml-auto">${n.meta}</span>` : ''}
            </div>
            <h3 class="font-bold text-lg md:text-xl leading-snug">${n.title}</h3>
            <p class="text-sm md:text-base text-zinc-300 mt-3 leading-relaxed">${n.summary}</p>
            ${n.points?.length ? `
                <ul class="news-points mt-4 space-y-2 text-sm text-zinc-400 pl-5">
                    ${n.points.map(p => `<li class="leading-relaxed">${p}</li>`).join('')}
                </ul>
            ` : ''}
            ${n.source ? `
                <p class="text-xs text-zinc-600 mt-4 pt-3 border-t border-zinc-800">
                    <i class="fa-brands fa-x-twitter mr-1"></i>參考來源：${n.source}
                </p>
            ` : ''}
        </article>`;
}

function renderNews() {
    const news = generateNews();
    $('news-list').innerHTML = news.map((n, i) => renderNewsCard(n, i)).join('');
}

function renderIdleTeams() {
    const idle = getIdleTeams();
    const grid = $('idle-teams-grid');
    $('idle-team-count').textContent = idle.length ? `（${idle.length} 隊）` : '';

    if (!idle.length) {
        grid.innerHTML = '<p class="text-sm text-zinc-500">載入隊伍資料中…</p>';
        return;
    }

    grid.innerHTML = idle.map(t => `
        <span class="team-chip inline-flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 border border-zinc-700 rounded-2xl text-xs text-zinc-300">
            ${t.flag ? `<img src="${t.flag}" class="w-4 h-3 object-cover rounded-sm" alt="">` : ''}
            <span>${teamZh(t.name_en)}</span>
            <span class="text-zinc-600">${t.groups}組</span>
        </span>
    `).join('');
}

function renderIdleNews() {
    const news = generateIdleNews();
    const list = $('idle-news-list');

    if (!news.length) {
        list.innerHTML = '';
        $('no-idle-news').classList.remove('hidden');
        return;
    }
    $('no-idle-news').classList.add('hidden');
    list.innerHTML = news.map((n, i) => renderNewsCard(n, i)).join('');
}

function updateTabBadges() {
    const todayGames = state.games.filter(g => isTodayInTaipei(g) && isPlayedOrLive(g)).length;
    const idleNews = generateIdleNews().length;
    $('tab-results-badge').textContent = todayGames ? `${todayGames} 場` : '—';
    $('tab-idle-badge').textContent = idleNews ? `${idleNews} 則` : '—';
}

function switchTab(tab) {
    const isResults = tab === 'results';
    $('tab-results').classList.toggle('active', isResults);
    $('tab-idle').classList.toggle('active', !isResults);
    $('panel-results').classList.toggle('active', isResults);
    $('panel-idle').classList.toggle('active', !isResults);
}

function setupTabs() {
    $('tab-results').addEventListener('click', () => switchTab('results'));
    $('tab-idle').addEventListener('click', () => switchTab('idle'));
}

function renderAll() {
    const tp = getTaipeiToday().replace(/-/g, '/');
    $('date-label').textContent = `${tp} 台灣時間`;
    renderMatches();
    renderStandings();
    renderNews();
    renderIdleTeams();
    renderIdleNews();
    updateTabBadges();
}

function showToast(msg, ok = true) {
    const t = $('toast');
    $('toast-msg').textContent = msg;
    $('toast-icon').className = ok ? 'fa-solid fa-check text-emerald-400' : 'fa-solid fa-xmark text-red-400';
    t.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.add('hidden'), 2800);
}

function setLoading(on) {
    state.loading = on;
    const btn = $('btn-refresh');
    const icon = $('refresh-icon');
    btn.disabled = on;
    if (on) {
        icon.className = 'fa-solid fa-sync-alt spin';
        $('refresh-text').textContent = '更新中…';
    } else {
        icon.className = 'fa-solid fa-bolt';
        $('refresh-text').textContent = '一鍵即時更新';
    }
}

function showError(title, detail) {
    $('error-banner').classList.remove('hidden');
    $('error-title').textContent = title;
    $('error-detail').textContent = detail;
}

function hideError() {
    $('error-banner').classList.add('hidden');
}

function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ...data, savedAt: Date.now() })); } catch {}
}

function loadCache() {
    try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
    } catch { return null; }
}

async function fetchJSON(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

async function refreshData(manual = true) {
    if (state.loading) return;
    setLoading(true);
    hideError();

    try {
        const [gamesRes, groupsRes, teamsRes] = await Promise.all([
            fetchJSON(API.games),
            fetchJSON(API.groups),
            fetchJSON(API.teams),
        ]);

        state.games = gamesRes.games || [];
        state.groups = groupsRes.groups || [];
        state.teams = {};
        (teamsRes.teams || []).forEach(t => { state.teams[t.id] = t; });

        saveCache({ games: state.games, groups: state.groups, teams: state.teams });
        renderAll();

        const now = new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        $('last-updated').textContent = `最後更新：${now}`;
        if (manual) showToast('已同步最新賽果與積分');
    } catch (err) {
        const cached = loadCache();
        if (cached) {
            state.games = cached.games;
            state.groups = cached.groups;
            state.teams = cached.teams;
            renderAll();
            showError('連線失敗，顯示快取資料', `${err.message}。請檢查網路後再試。`);
            showToast('使用離線快取', false);
        } else {
            showError('無法取得資料', `${err.message}。請確認網路連線正常。`);
            showToast('更新失敗', false);
        }
    } finally {
        setLoading(false);
    }
}

function setupAutoRefresh() {
    const cb = $('auto-refresh');
    const dot = $('live-indicator');

    function toggle() {
        clearInterval(autoTimer);
        if (cb.checked) {
            dot.className = 'live-dot w-2 h-2 rounded-full bg-emerald-400';
            autoTimer = setInterval(() => refreshData(false), AUTO_REFRESH_SEC * 1000);
        } else {
            dot.className = 'w-2 h-2 rounded-full bg-zinc-600';
        }
    }

    cb.addEventListener('change', toggle);
    toggle();
}

$('btn-refresh').addEventListener('click', () => refreshData(true));
setupAutoRefresh();
setupTabs();

function applyData(data) {
    state.games = data.games || [];
    state.groups = data.groups || [];
    state.teams = data.teams || {};
    renderAll();
}

const cached = loadCache();
if (cached?.games?.length) {
    applyData(cached);
} else {
    $('date-label').textContent = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }) + ' 台灣時間';
}
refreshData(false);
</script>
</body>
</html>
