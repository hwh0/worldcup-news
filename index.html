    const verKey = 'wc_app_version';
    if (localStorage.getItem(verKey) === APP_VERSION) return;
    try {
        Object.keys(localStorage).forEach(k => {
            if (k.startsWith('wc_news_cache_')) localStorage.removeItem(k);
        });
        localStorage.setItem(verKey, APP_VERSION);
    } catch {}
}

let state = { teams: {}, groups: [], games: [], loading: false };
let autoTimer = null;

const $ = id => document.getElementById(id);

function teamZh(name) { return TEAM_ZH[name] || name; }

function parseScorers(raw) {
    if (!raw || raw === 'null') return [];
    try {
        const fixed = raw.replace(/'/g, '"').replace(/\\"/g, "'");
        const arr = JSON.parse(fixed.startsWith('[') ? fixed : `[${fixed}]`);
        return Array.isArray(arr) ? arr : [raw];
    } catch {
        return raw.split(',').map(s => s.trim()).filter(Boolean);
    }
}

function gameToTaipeiDate(localDate) {
    const [datePart, timePart] = localDate.split(' ');
    const [mm, dd, yyyy] = datePart.split('/');
    const [hh, min] = timePart.split(':');
    const utcMs = Date.UTC(+yyyy, +mm - 1, +dd, +hh + 4, +min);
    return new Date(utcMs + 8 * 3600000);
}

function getTaipeiToday() {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(now);
    return parts;
}

function isTodayInTaipei(game) {
    const taipei = gameToTaipeiDate(game.local_date);
    const tp = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(taipei);
    return tp === getTaipeiToday();
}

/** 新聞文案對應 NEWS_UPDATED 當天台灣賽程，避免隔天開啟時新聞空白 */
function isNewsDateInTaipei(game) {
    const taipei = gameToTaipeiDate(game.local_date);
    const tp = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(taipei);
    return tp === NEWS_UPDATED;
}

function isLive(game) {
    return game.finished !== 'TRUE' && game.time_elapsed && game.time_elapsed !== 'finished' && game.time_elapsed !== 'notstarted';
}

function isFinished(game) {
    return game.finished === 'TRUE' || game.time_elapsed === 'finished';
}

/** 只顯示已完賽或進行中，排除尚未開踢的賽事 */
function isPlayedOrLive(game) {
    return isFinished(game) || isLive(game);
}

function matchStatus(game) {
    if (isLive(game)) return { label: '進行中', cls: 'text-amber-400', badge: 'bg-amber-950 text-amber-400' };
    if (game.finished === 'TRUE') return { label: '已結束', cls: 'text-zinc-400', badge: 'bg-zinc-800 text-zinc-400' };
    return { label: '即將開賽', cls: 'text-blue-400', badge: 'bg-blue-950 text-blue-400' };
}

function winnerLabel(home, away, hs, as) {
    const hi = +hs, ai = +as;
    if (isNaN(hi) || isNaN(ai)) return '';
    if (hi > ai) return `${teamZh(home)}勝`;
    if (ai > hi) return `${teamZh(away)}勝`;
    return '和局';
}

function highlightScorerNote(game) {
    const homeS = parseScorers(game.home_scorers);
    const awayS = parseScorers(game.away_scorers);
    const all = [...homeS, ...awayS];
    if (!all.length) return '';
    const first = all[0].replace(/"/g, '');
    const hatTrick = all.filter(s => s.includes("'")).length >= 3;
    if (hatTrick) return '精彩進球大戰';
    if (first.includes('(OG)')) return '烏龍球影響戰局';
    if (first.includes("'")) return first;
    return first.slice(0, 30);
}

function getGameById(id) {
    return state.games.find(g => String(g.id) === String(id));
}

function getMatchWinner(game) {
    if (!game || !isFinished(game)) return null;
    const hs = +game.home_score, as = +game.away_score;
    if (hs > as) return { id: game.home_team_id, name: game.home_team_name_en };
    if (as > hs) return { id: game.away_team_id, name: game.away_team_name_en };
    return null;
}

function humanizeKnockoutLabel(label) {
    if (!label) return '待定';
    return label
        .replace(/Winner Match (\d+)/gi, (_, mid) => {
            const src = getGameById(mid);
            if (!src) return `第 ${mid} 場勝者`;
            const h = teamZh(src.home_team_name_en || resolveGameTeams(src).home);
            const a = teamZh(src.away_team_name_en || resolveGameTeams(src).away);
            const w = getMatchWinner(src);
            if (w) return teamZh(w.name);
            return `${h} vs ${a} 勝者`;
        })
        .replace(/Runner-up Group ([A-L])/gi, '$1 組亞軍')
        .replace(/Winner Group ([A-L])/gi, '$1 組冠軍')
        .replace(/Third Group ([A-L])/gi, '$1 組第三名');
}

function resolveTeamFromLabel(label) {
    if (!label) return null;
    const wm = label.match(/Winner Match (\d+)/i);
    if (wm) {
        const w = getMatchWinner(getGameById(wm[1]));
        return w ? { id: w.id, name: w.name, resolved: true } : { label, resolved: false };
    }
    const ru = label.match(/Runner-up Group ([A-L])/i);
    if (ru) {
        const grp = state.groups.find(g => g.name === ru[1]);
        if (!grp) return { label, resolved: false };
        const t = sortGroupTeams(grp.teams)[1];
        const team = t && state.teams[t.team_id];
        return team ? { id: t.team_id, name: team.name_en, resolved: true } : { label, resolved: false };
    }
    const wg = label.match(/Winner Group ([A-L])/i);
    if (wg) {
        const grp = state.groups.find(g => g.name === wg[1]);
        if (!grp) return { label, resolved: false };
        const t = sortGroupTeams(grp.teams)[0];
        const team = t && state.teams[t.team_id];
        return team ? { id: t.team_id, name: team.name_en, resolved: true } : { label, resolved: false };
    }
    return { label, resolved: false };
}

function resolveGameTeams(game) {
    let homeName = game.home_team_name_en;
    let awayName = game.away_team_name_en;
    let homeId = game.home_team_id;
    let awayId = game.away_team_id;

    if ((!homeName || homeId === '0') && game.home_team_label) {
        const r = resolveTeamFromLabel(game.home_team_label);
        if (r?.resolved) { homeName = r.name; homeId = r.id; }
    }
    if ((!awayName || awayId === '0') && game.away_team_label) {
        const r = resolveTeamFromLabel(game.away_team_label);
        if (r?.resolved) { awayName = r.name; awayId = r.id; }
    }

    return {
        home: homeName || humanizeKnockoutLabel(game.home_team_label),
        away: awayName || humanizeKnockoutLabel(game.away_team_label),
        homeId, awayId,
        homeResolved: !!(homeName && homeId !== '0'),
        awayResolved: !!(awayName && awayId !== '0'),
    };
}

function stageLabel(game) {
    const map = { r32: '三十二強', r16: '十六強', r8: '八強', r4: '準決賽', r2: '決賽' };
    if (game.type && map[game.type]) return map[game.type];
    if (game.group === 'R32') return '三十二強';
    if (game.group === 'R16') return '十六強';
    if (game.group === 'R8') return '八強';
    return game.group ? `${game.group} 組` : '';
}

function renderKnockoutMatchCard(g, stage, advanceTo) {
    const t = resolveGameTeams(g);
    const homeTeam = state.teams[t.homeId];
    const awayTeam = state.teams[t.awayId];
    const date = g.local_date ? g.local_date.split(' ')[0] : '';
    const finished = isFinished(g);
    const live = isLive(g);
    const hs = g.home_score ?? '-';
    const as = g.away_score ?? '-';
    const win = finished ? winnerLabel(t.home, t.away, hs, as) : '';

    return `
    <div class="fade-in bg-zinc-900 border ${live ? 'border-amber-500/50' : 'border-zinc-700'} rounded-3xl p-5">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-xs px-2.5 py-0.5 rounded-xl bg-emerald-950 text-emerald-400 font-semibold">${stage}</span>
            <span class="text-xs text-zinc-500">${date}</span>
            ${live ? '<span class="live-dot w-2 h-2 rounded-full bg-amber-400"></span><span class="text-xs text-amber-400">進行中</span>' : ''}
            ${finished ? '<span class="text-xs px-2 py-0.5 rounded-lg bg-zinc-800 text-zinc-400">已結束</span>' : ''}
        </div>
        <div class="flex items-center gap-2 font-semibold text-base flex-wrap">
            <span class="inline-flex items-center gap-1.5 ${t.homeResolved ? 'text-zinc-100' : 'text-zinc-400'}">
                ${homeTeam?.flag ? `<img src="${homeTeam.flag}" class="w-5 h-3.5 object-cover rounded-sm" alt="">` : ''}
                ${teamZh(t.home)}
            </span>
            ${finished || live
                ? `<span class="text-emerald-400 tabular-nums">${hs}</span><span class="text-zinc-600">-</span><span class="text-red-400 tabular-nums">${as}</span>`
                : '<span class="text-zinc-600 mx-1">vs</span>'}
            <span class="inline-flex items-center gap-1.5 ${t.awayResolved ? 'text-zinc-100' : 'text-zinc-400'}">
                ${teamZh(t.away)}
                ${awayTeam?.flag ? `<img src="${awayTeam.flag}" class="w-5 h-3.5 object-cover rounded-sm" alt="">` : ''}
            </span>
        </div>
        ${win && advanceTo ? `<div class="text-xs text-emerald-400 mt-2">${win} · 晉級${advanceTo}</div>` : ''}
    </div>`;
}

function renderKnockoutBracket() {
    const container = $('knockout-container');
    const countEl = $('knockout-qualified-count');
    const byDate = (a, b) => gameToTaipeiDate(a.local_date) - gameToTaipeiDate(b.local_date);

    const r16 = state.games.filter(g => g.type === 'r16' || g.group === 'R16').sort(byDate);
    const r16Done = r16.filter(isFinished).length;

    countEl.textContent = r16.length ? `（十六強 ${r16Done}/${r16.length} 場完賽）` : '';

    if (!r16.length) {
        container.innerHTML = '<p class="text-sm text-zinc-500">載入十六強對陣中…</p>';
        return;
    }

    const block = (title, games, stage, advanceTo) => {
        if (!games.length) return '';
        return `
        <div>
            <h3 class="text-sm font-semibold text-zinc-400 mb-3">${title}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${games.map(g => renderKnockoutMatchCard(g, stage, advanceTo)).join('')}
            </div>
        </div>`;
    };

    container.innerHTML = block('十六強', r16, '十六強', '八強');
}

function renderMatches() {
    const grid = $('matches-grid');
    const todayAll = state.games.filter(isTodayInTaipei);
    const todayGames = todayAll.filter(isPlayedOrLive).sort((a, b) => gameToTaipeiDate(a.local_date) - gameToTaipeiDate(b.local_date));
    const upcoming = todayAll.filter(g => !isPlayedOrLive(g)).length;
    $('match-count').textContent = todayGames.length ? `（${todayGames.length} 場）` : '';

    if (!todayGames.length) {
        grid.innerHTML = '';
        $('no-matches').classList.remove('hidden');
        $('no-matches').textContent = upcoming
            ? `今日尚有 ${upcoming} 場比賽尚未開踢，完賽後將自動顯示於此。`
            : '今日尚無已完賽或進行中的比賽。';
        return;
    }
    $('no-matches').classList.add('hidden');

    grid.innerHTML = todayGames.map(g => {
        const t = resolveGameTeams(g);
        const home = t.home;
        const away = t.away;
        const hs = g.home_score ?? '-';
        const as = g.away_score ?? '-';
        const st = matchStatus(g);
        const note = highlightScorerNote(g);
        const win = winnerLabel(home, away, hs, as);
        const live = isLive(g);
        const homeTeam = state.teams[t.homeId];
        const awayTeam = state.teams[t.awayId];
        const stage = stageLabel(g);
        const advanceNote = isFinished(g) && (g.type === 'r16' || g.group === 'R16')
            ? '<div class="text-xs text-emerald-400/80 mt-1">晉級八強</div>' : '';

        return `
        <div class="match-card fade-in bg-zinc-900 border ${live ? 'border-amber-500/50' : 'border-zinc-700'} rounded-3xl p-5">
            <div class="flex justify-between items-start gap-3">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs px-2.5 py-0.5 rounded-xl ${st.badge}">${st.label}</span>
                        ${live ? '<span class="live-dot w-2 h-2 rounded-full bg-amber-400"></span>' : ''}
                        <span class="text-xs text-zinc-500">${stage}</span>
                    </div>
                    <div class="flex items-center gap-3 font-semibold text-lg">
                        ${homeTeam?.flag ? `<img src="${homeTeam.flag}" class="w-6 h-4 object-cover rounded-sm" alt="">` : ''}
                        <span>${teamZh(home)}</span>
                        <span class="text-emerald-400 tabular-nums">${hs}</span>
                        <span class="text-zinc-500">-</span>
                        <span class="text-red-400 tabular-nums">${as}</span>
                        <span>${teamZh(away)}</span>
                        ${awayTeam?.flag ? `<img src="${awayTeam.flag}" class="w-6 h-4 object-cover rounded-sm" alt="">` : ''}
                    </div>
                    ${note ? `<div class="text-xs text-zinc-400 mt-2 truncate">${note}</div>` : ''}
                </div>
                <div class="text-right text-sm shrink-0">
                    ${win ? `<div class="text-emerald-400 font-medium">${win}</div>` : ''}
                    ${advanceNote}
                    ${live && g.time_elapsed ? `<div class="text-amber-400 text-xs mt-1">${g.time_elapsed}</div>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function sortGroupTeams(teams) {
    return [...teams].sort((a, b) =>
        +b.pts - +a.pts || +b.gd - +a.gd || +b.gf - +a.gf || +a.ga - +b.ga
    );
}

function matchKey(home, away) {
    return [home, away].sort().join('|');
}

function getTodayFinishedKeys() {
    return new Set(
        state.games
            .filter(g => isTodayInTaipei(g) && isFinished(g))
            .map(g => matchKey(g.home_team_name_en, g.away_team_name_en))
    );
}

function addTeamName(set, name) {
    if (name && name !== '待定' && !name.includes('勝者') && !name.includes('組')) set.add(name);
}

function getTeamsPlayingToday() {
    const set = new Set();
    state.games.filter(isTodayInTaipei).forEach(g => {
        const t = resolveGameTeams(g);
        addTeamName(set, g.home_team_name_en);
        addTeamName(set, g.away_team_name_en);
        if (t.homeResolved) addTeamName(set, t.home);
        if (t.awayResolved) addTeamName(set, t.away);
    });
    return set;
}

function getTeamsPlayingOnNewsDate() {
    const set = new Set();
    state.games.filter(isNewsDateInTaipei).forEach(g => {
        const t = resolveGameTeams(g);
        addTeamName(set, g.home_team_name_en);
        addTeamName(set, g.away_team_name_en);
        if (t.homeResolved) addTeamName(set, t.home);
        if (t.awayResolved) addTeamName(set, t.away);
    });
    return set;
}

function getIdleTeams() {
    const playing = getTeamsPlayingToday();
    return Object.values(state.teams)
        .filter(t => t.name_en && !playing.has(t.name_en))
        .sort((a, b) => (a.groups || '').localeCompare(b.groups || '') || a.name_en.localeCompare(b.name_en));
}

function getTodayMatchKeys() {
    const keys = new Set();
    state.games.filter(isTodayInTaipei).forEach(g => {
        const t = resolveGameTeams(g);
        const home = g.home_team_name_en || (t.homeResolved ? t.home : null);
        const away = g.away_team_name_en || (t.awayResolved ? t.away : null);
        if (home && away) keys.add(matchKey(home, away));
    });
    return keys;
}

function getNewsDateMatchKeys() {
    const keys = new Set();
    state.games.filter(isNewsDateInTaipei).forEach(g => {
        const t = resolveGameTeams(g);
        const home = g.home_team_name_en || (t.homeResolved ? t.home : null);
        const away = g.away_team_name_en || (t.awayResolved ? t.away : null);
        if (home && away) keys.add(matchKey(home, away));
    });
    return keys;
}

function generateNews() {
    const newsKeys = getNewsDateMatchKeys();
    const hasApi = state.games.length > 0;

    return TODAY_TOP10_NEWS
        .filter(item => {
            if (!hasApi || !newsKeys.size) return true;
            return newsKeys.has(matchKey(item.match.home, item.match.away));
        })
        .sort((a, b) => a.priority - b.priority)
        .slice(0, 10);
}

function generateIdleNews() {
    const playing = getTeamsPlayingOnNewsDate();
    const hasApi = state.games.length > 0;
    const todayIds = new Set(generateNews().map(n => n.id));

    return IDLE_TEAM_NEWS
        .filter(item => {
            if (todayIds.has(item.id)) return false;
            if (!hasApi) return true;
            return item.relatedTeams.every(t => !playing.has(t));
        })
        .sort((a, b) => a.priority - b.priority)
        .slice(0, 10);
}

function renderNews() {
    const news = generateNews();
    const list = $('news-list');

        const hint = '新聞資料載入中，或請查看「無賽事球隊動態」分頁的備戰消息。';

function getTodayNewsMatchKeys() {
    const keys = new Set();
    generateNews().forEach(n => {
        if (n.match?.home && n.match?.away) keys.add(matchKey(n.match.home, n.match.away));
    });
    return keys;
}

/** X 熱議：排除與今日賽事新聞相同 id 或相同場次的戰報重複 */
function generateTrending() {
    const newsIds = new Set(generateNews().map(n => n.id));
    const newsMatchKeys = getTodayNewsMatchKeys();

    return [...X_TRENDING_TOP20]
        .filter(t => {
            if (newsIds.has(t.id)) return false;
            if (t.match?.home && t.match?.away && newsMatchKeys.has(matchKey(t.match.home, t.match.away))) return false;
            return true;
        })
        .sort((a, b) => a.priority - b.priority)
        .slice(0, TRENDING_LIMIT);
}

function renderTrending() {
    const items = generateTrending();
    const list = $('trending-list');
    if (!items.length) {
        list.innerHTML = '<p class="text-sm text-zinc-500 py-4">今日戰報已收錄於「今日賽果」分頁，暫無額外社群熱議。</p>';
        return;
    }
    list.innerHTML = items.map((t, i) => renderTrendingCard(t, i)).join('');
}

function renderIdleTeams() {
    const idle = getIdleTeams();
    const grid = $('idle-teams-grid');
    $('idle-team-count').textContent = idle.length ? `（${idle.length} 隊）` : '';

    if (!idle.length) {
        grid.innerHTML = '<p class="text-sm text-zinc-500">載入隊伍資料中…</p>';
        return;
    }

    grid.innerHTML = idle.map(t => `
        <span class="team-chip inline-flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 border border-zinc-700 rounded-2xl text-xs text-zinc-300">
            ${t.flag ? `<img src="${t.flag}" class="w-4 h-3 object-cover rounded-sm" alt="">` : ''}
            <span>${teamZh(t.name_en)}</span>
            <span class="text-zinc-600">${t.groups}組</span>
        </span>
    `).join('');
}

function renderIdleNews() {
    const news = generateIdleNews();
    const list = $('idle-news-list');

    if (!news.length) {
        list.innerHTML = '';
        $('no-idle-news').classList.remove('hidden');
        return;
    }
    $('no-idle-news').classList.add('hidden');
    list.innerHTML = news.map((n, i) => renderNewsCard(n, i)).join('');
}

function updateTabBadges() {
    const todayGames = state.games.filter(g => isTodayInTaipei(g) && isPlayedOrLive(g)).length;
    const idleNews = generateIdleNews().length;
    const trendingCount = generateTrending().length;
    $('tab-results-badge').textContent = todayGames ? `${todayGames} 場` : '—';
    $('tab-idle-badge').textContent = idleNews ? `${idleNews} 則` : '—';
    $('tab-trending-badge').textContent = `${trendingCount} 則`;
}

function switchTab(tab) {
    ['results', 'idle', 'trending'].forEach(t => {
        $(`tab-${t}`).classList.toggle('active', t === tab);
        $(`panel-${t}`).classList.toggle('active', t === tab);
    });
}

function setupTabs() {
    $('tab-results').addEventListener('click', () => switchTab('results'));
    $('tab-idle').addEventListener('click', () => switchTab('idle'));
    $('tab-trending').addEventListener('click', () => switchTab('trending'));
}

function renderAll() {
    const tp = getTaipeiToday().replace(/-/g, '/');
    $('date-label').textContent = `${tp} 台灣時間 · 新聞 ${NEWS_UPDATED} · ${APP_VERSION}`;
    renderMatches();
    renderKnockoutBracket();
    renderNews();
    renderIdleTeams();
    renderIdleNews();
    renderTrending();
    updateTabBadges();
}

function showToast(msg, ok = true) {
    const t = $('toast');
    $('toast-msg').textContent = msg;
    $('toast-icon').className = ok ? 'fa-solid fa-check text-emerald-400' : 'fa-solid fa-xmark text-red-400';
    t.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.add('hidden'), 2800);
}

function setLoading(on) {
    state.loading = on;
    const btn = $('btn-refresh');
    const icon = $('refresh-icon');
    btn.disabled = on;
    if (on) {
        icon.className = 'fa-solid fa-sync-alt spin';
        $('refresh-text').textContent = '更新中…';
    } else {
        icon.className = 'fa-solid fa-bolt';
        $('refresh-text').textContent = '一鍵即時更新';
    }
}

function showError(title, detail) {
    $('error-banner').classList.remove('hidden');
    $('error-title').textContent = title;
    $('error-detail').textContent = detail;
}

function hideError() {
    $('error-banner').classList.add('hidden');
}

function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ...data, savedAt: Date.now() })); } catch {}
}

function loadCache() {
    try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
    } catch { return null; }
}

async function fetchJSON(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

async function refreshData(manual = true) {
    if (state.loading) return;
    setLoading(true);
    hideError();

    try {
        const [gamesRes, groupsRes, teamsRes] = await Promise.all([
            fetchJSON(API.games),
            fetchJSON(API.groups),
            fetchJSON(API.teams),
        ]);

        state.games = gamesRes.games || [];
        state.groups = groupsRes.groups || [];
        state.teams = {};
        (teamsRes.teams || []).forEach(t => { state.teams[t.id] = t; });

        saveCache({ games: state.games, groups: state.groups, teams: state.teams });
        renderAll();

        const now = new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        $('last-updated').textContent = `最後更新：${now}`;
        if (manual) showToast('已同步最新賽果與積分');
    } catch (err) {
        const cached = loadCache();
        if (cached) {
            state.games = cached.games;
            state.groups = cached.groups;
            state.teams = cached.teams;
            renderAll();
            showError('連線失敗，顯示快取資料', `${err.message}。請檢查網路後再試。`);
            showToast('使用離線快取', false);
        } else {
            renderAll();
            showError('無法取得資料', `${err.message}。新聞文案已顯示，比分請稍後再試或改用 GitHub Pages 開啟。`);
            showToast('新聞已載入，比分同步失敗', false);
        }
    } finally {
        setLoading(false);
    }
}

function setupAutoRefresh() {
    const cb = $('auto-refresh');
    const dot = $('live-indicator');

    function toggle() {
        clearInterval(autoTimer);
        if (cb.checked) {
            dot.className = 'live-dot w-2 h-2 rounded-full bg-emerald-400';
            autoTimer = setInterval(() => refreshData(false), AUTO_REFRESH_SEC * 1000);
        } else {
            dot.className = 'w-2 h-2 rounded-full bg-zinc-600';
        }
    }

    cb.addEventListener('change', toggle);
    toggle();
}

$('btn-refresh').addEventListener('click', () => refreshData(true));
setupAutoRefresh();
setupTabs();

function applyData(data) {
    state.games = data.games || [];
    state.groups = data.groups || [];
    state.teams = data.teams || {};
    renderAll();
}

renderAll();

const cached = loadCache();
if (cached?.games?.length) {
    applyData(cached);
}
refreshData(false);
</script>
</body>
</html>
